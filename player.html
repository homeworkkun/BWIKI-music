<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在播放</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        * { box-sizing: border-box; }
        
        .back-link {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            font-size: 0.9rem; color: var(--accent-color);
            text-decoration: none; padding: 5px 10px; background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--accent-color); border-radius: 6px;
            transition: all 0.2s;
        }
        .back-link:hover { background: var(--accent-color); color: #000; }
        
        header { position: relative; }
        header h1 { padding: 0 80px; }
        
        .player-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 500px; padding: 20px;
        }
        
        .vinyl-container { position: relative; margin-bottom: 25px; }
        
        .vinyl {
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(#222 60%, #000 65%);
            border: 4px solid #111;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 60px rgba(212, 175, 55, 0.1);
            animation: spin 6s linear infinite; animation-play-state: paused;
            position: relative; overflow: hidden;
        }
        
        .vinyl-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: 
                repeating-radial-gradient(circle at center, #111 0px, #1a1a1a 1px, #111 2px),
                conic-gradient(from 0deg, #0a0a0a 0deg 20deg, #151515 20deg 40deg, #0a0a0a 40deg 60deg, #151515 60deg 80deg, #0a0a0a 80deg 100deg, #151515 100deg 120deg, #0a0a0a 120deg 140deg, #151515 140deg 160deg, #0a0a0a 160deg 180deg, #151515 180deg 200deg, #0a0a0a 200deg 220deg, #151515 220deg 240deg, #0a0a0a 240deg 260deg, #151515 260deg 280deg, #0a0a0a 280deg 300deg, #151515 300deg 320deg, #0a0a0a 320deg 340deg, #151515 340deg 360deg);
            border: 2px solid #333;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .vinyl-icon::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 22px; height: 22px; border-radius: 50%;
            background: linear-gradient(135deg, #8b0000, #5c0000);
            transform: translate(-50%, -50%);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        .vinyl-icon::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 6px; height: 6px; border-radius: 50%;
            background: #000; transform: translate(-50%, -50%); z-index: 1;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .song-info {
            text-align: center; margin-bottom: 20px; width: 100%;
        }
        .song-info h2 {
            margin: 0 0 6px 0; font-size: 1.3rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .song-info .artist { color: #888; font-size: 0.9rem; margin: 0; }
        .play-mode-badge {
            display: inline-block; background: rgba(212, 175, 55, 0.2);
            color: var(--accent-color); padding: 4px 12px; border-radius: 20px;
            font-size: 0.75rem; margin-top: 8px;
        }
        
        .progress-section { width: 100%; margin-bottom: 20px; }
        
        .progress-bar {
            width: 100%; height: 6px; background: #333;
            border-radius: 3px; cursor: pointer; position: relative;
            overflow: hidden;
        }
        .progress-bar:hover { height: 8px; }
        
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--accent-color), #f0d78c);
            border-radius: 3px; width: 0%; transition: width 0.1s linear;
        }
        
        .time-display {
            display: flex; justify-content: space-between;
            font-size: 0.8rem; color: #666; margin-top: 8px;
        }
        
        .controls {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 20px;
        }
        
        .control-btn {
            background: none; border: none; color: var(--accent-color);
            cursor: pointer; transition: all 0.2s; display: flex;
            align-items: center; justify-content: center;
        }
        .control-btn:hover { transform: scale(1.1); }
        .control-btn:active { transform: scale(0.95); }
        
        .control-btn.small {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(212, 175, 55, 0.15); border: 1px solid var(--accent-color);
            color: var(--accent-color); font-size: 1rem;
        }
        .control-btn.small:hover { background: rgba(212, 175, 55, 0.3); }
        .control-btn.large {
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--accent-color); color: #000;
            font-size: 1.5rem; border: none;
        }
        .control-btn.large:hover { background: #f0d78c; }
        
        .volume-section {
            display: flex; align-items: center; gap: 12px;
            width: 100%; max-width: 280px; padding: 12px 16px;
            background: rgba(255,255,255,0.05); border-radius: 10px;
        }
        
        .volume-icon {
            font-size: 1.2rem; color: var(--accent-color);
            min-width: 24px; text-align: center; cursor: pointer;
        }
        
        .volume-slider {
            flex: 1; -webkit-appearance: none; appearance: none;
            height: 6px; background: #333; border-radius: 3px;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: var(--accent-color); border-radius: 50%;
            cursor: pointer; transition: transform 0.2s;
        }
        .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .volume-slider::-moz-range-thumb {
            width: 16px; height: 16px; background: var(--accent-color);
            border-radius: 50%; cursor: pointer; border: none;
        }
        
        .volume-value {
            font-size: 0.8rem; color: #888; min-width: 35px;
            text-align: right;
        }
        
        .action-buttons {
            display: flex; gap: 10px; margin-top: 15px;
        }
        
        .action-btn {
            padding: 10px 20px; background: rgba(255,255,255,0.05);
            border: 1px solid #444; color: #aaa; border-radius: 6px;
            cursor: pointer; transition: all 0.2s; font-size: 0.85rem;
            text-decoration: none; display: flex; align-items: center; gap: 6px;
        }
        .action-btn:hover {
            background: rgba(255,255,255,0.1); border-color: var(--accent-color);
            color: var(--accent-color);
        }
        
        audio { display: none; }
        
        @media (max-width: 600px) {
            .container { padding: 15px 10px; }
            .vinyl { width: 200px; height: 200px; }
            .vinyl-icon { width: 65px; height: 65px; }
            .vinyl-icon::after { width: 18px; height: 18px; }
        }
            .song-info h2 { font-size: 1.1rem; }
            .song-info .artist { font-size: 0.85rem; }
            .control-btn.small { width: 40px; height: 40px; }
            .control-btn.large { width: 54px; height: 54px; }
            .volume-section { padding: 10px 12px; gap: 10px; }
            .volume-icon { font-size: 1.1rem; }
            .action-btn { padding: 8px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <header>
        <a id="backBtn" href="#" class="back-link">← 返回</a>
        <h1>NOW PLAYING</h1>
    </header>

    <div class="container">
        <div class="player-container">
            <div class="vinyl-container">
                <div class="vinyl" id="vinyl">
                    <div class="vinyl-icon"></div>
                </div>
            </div>
            
            <div class="song-info">
                <h2 id="songTitle">Loading...</h2>
                <p class="artist" id="artist">...</p>
                <div class="play-mode-badge" id="playModeBadge" style="display:none;"></div>
            </div>

            <div class="progress-section">
                <div class="progress-bar" id="progressBar" onclick="seekTo(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn small" onclick="skipBackward()" title="后退10秒">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/>
                    </svg>
                </button>
                <button class="control-btn large" id="playBtn" onclick="togglePlay()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" id="playIcon">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
                <button class="control-btn small" onclick="skipForward()" title="前进10秒">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/>
                    </svg>
                </button>
            </div>

            <div class="volume-section">
                <span class="volume-icon" id="volumeIcon" onclick="toggleMute()">🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" 
                       min="0" max="100" value="80" oninput="changeVolume(this.value)">
                <span class="volume-value" id="volumeValue">80%</span>
            </div>

            <div class="action-buttons">
                <a class="action-btn" id="downloadBtn" href="#" download>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                    下载
                </a>
                <button class="action-btn" id="backBtn2">← 返回列表</button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const albumId = params.get('albumId');
        const songId = params.get('songId');

        document.getElementById('backBtn').href = `/list.html?albumId=${albumId}`;
        document.getElementById('backBtn2').onclick = () => {
            window.location.href = `/list.html?albumId=${albumId}`;
        };

        const audio = document.getElementById('audio');
        const vinyl = document.getElementById('vinyl');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeIcon = document.getElementById('volumeIcon');
        const volumeValue = document.getElementById('volumeValue');
        const downloadBtn = document.getElementById('downloadBtn');

        let audioContext = null;
        let sourceNodes = [];
        let isIntroLoopMode = false;
        let introAudioBuffer = null;
        let loopAudioBuffer = null;
        let gainNode = null;
        let currentAlbum = null;
        let currentSong = null;
        let introLoopStartTime = 0;
        let introLoopDuration = 0;
        let previousVolume = 80;

        audio.volume = 0.8;

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function detectPlayMode(src) {
            const filename = src.split('/').pop();
            const baseName = filename.replace('.mp3', '');
            const introMatch = baseName.match(/^(.+)_intro$/);
            const loopMatch = baseName.match(/^(.+)_loop$/);
            if (introMatch) return { type: 'intro_loop', baseName: introMatch[1] };
            if (loopMatch) return { type: 'intro_loop', baseName: loopMatch[1] };
            return { type: 'single' };
        }

        function getFullPath(src) {
            if (src.startsWith('/')) return src;
            return `/${src}`;
        }

        async function loadAudio(url) {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return await audioContext.decodeAudioData(arrayBuffer);
        }

        async function playIntroLoop(baseName) {
            isIntroLoopMode = true;
            const introSrc = getFullPath(`追击音乐/欢乐惊魂/${baseName}_intro.mp3`);
            const loopSrc = introSrc.replace('_intro.mp3', '_loop.mp3');
            
            try {
                introAudioBuffer = await loadAudio(introSrc);
                loopAudioBuffer = await loadAudio(loopSrc);
                
                const badge = document.getElementById('playModeBadge');
                badge.textContent = 'Intro → Loop 循环';
                badge.style.display = 'inline-block';
                
                introLoopDuration = introAudioBuffer.duration + loopAudioBuffer.duration;
                durationEl.textContent = formatTime(introLoopDuration);
                
                playIntro();
            } catch (e) {
                console.error('Failed to load intro/loop:', e);
            }
        }

        function playIntro() {
            if (introAudioBuffer && audioContext) {
                if (audioContext.state === 'suspended') audioContext.resume();
                if (!gainNode) {
                    gainNode = audioContext.createGain();
                    gainNode.connect(audioContext.destination);
                    gainNode.gain.value = volumeSlider.value / 100;
                }
                
                const source = audioContext.createBufferSource();
                source.buffer = introAudioBuffer;
                source.connect(gainNode);
                source.start(0);
                sourceNodes.push(source);
                introLoopStartTime = audioContext.currentTime;
                
                source.onended = () => {
                    const index = sourceNodes.indexOf(source);
                    if (index > -1) sourceNodes.splice(index, 1);
                    if (isIntroLoopMode) playLoop();
                };
                
                vinyl.style.animationPlayState = 'running';
                document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                updateIntroLoopProgress();
            }
        }

        function playLoop() {
            if (loopAudioBuffer && isIntroLoopMode && audioContext) {
                const source = audioContext.createBufferSource();
                source.buffer = loopAudioBuffer;
                source.loop = true;
                source.connect(gainNode);
                source.start(0);
                sourceNodes.push(source);
            }
        }

        function stopAll() {
            sourceNodes.forEach(s => { try { s.stop(); } catch(e) {} });
            sourceNodes = [];
            isIntroLoopMode = false;
            vinyl.style.animationPlayState = 'paused';
            document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
        }

        function updateIntroLoopProgress() {
            if (!isIntroLoopMode || !audioContext) return;
            const elapsed = audioContext.currentTime - introLoopStartTime;
            const progress = Math.min((elapsed / introLoopDuration) * 100, 100);
            progressFill.style.width = `${progress}%`;
            currentTimeEl.textContent = formatTime(elapsed);
            if (isIntroLoopMode && sourceNodes.length > 0) {
                requestAnimationFrame(updateIntroLoopProgress);
            }
        }

        function togglePlay() {
            if (isIntroLoopMode) {
                if (audioContext && audioContext.state === 'suspended') audioContext.resume();
                if (!sourceNodes.length) {
                    playIntro();
                } else {
                    stopAll();
                }
            } else {
                if (audio.paused) {
                    audio.play();
                } else {
                    audio.pause();
                }
            }
        }

        function seekTo(event) {
            if (isIntroLoopMode) return;
            const rect = progressBar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            if (audio.duration && isFinite(audio.duration)) {
                audio.currentTime = percent * audio.duration;
            }
        }

        function skipBackward() {
            if (isIntroLoopMode) return;
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        }

        function skipForward() {
            if (isIntroLoopMode) return;
            if (audio.duration && isFinite(audio.duration)) {
                audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
            }
        }

        function changeVolume(value) {
            const vol = value / 100;
            audio.volume = vol;
            if (gainNode) gainNode.gain.value = vol;
            volumeValue.textContent = `${value}%`;
            if (value == 0) volumeIcon.textContent = '🔇';
            else if (value < 30) volumeIcon.textContent = '🔈';
            else if (value < 70) volumeIcon.textContent = '🔉';
            else volumeIcon.textContent = '🔊';
        }

        function toggleMute() {
            if (volumeSlider.value > 0) {
                previousVolume = volumeSlider.value;
                volumeSlider.value = 0;
                changeVolume(0);
            } else {
                volumeSlider.value = previousVolume;
                changeVolume(previousVolume);
            }
        }

        audio.ontimeupdate = () => {
            if (isIntroLoopMode) return;
            if (audio.duration && isFinite(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        };

        audio.onloadedmetadata = () => {
            if (isIntroLoopMode) return;
            durationEl.textContent = formatTime(audio.duration);
        };

        audio.onplay = () => {
            vinyl.style.animationPlayState = 'running';
            document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        };

        audio.onpause = () => {
            vinyl.style.animationPlayState = 'paused';
            document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
        };

        audio.onended = () => {
            vinyl.style.animationPlayState = 'paused';
            document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
            progressFill.style.width = '0%';
            currentTimeEl.textContent = '0:00';
        };

        fetch('/data.json')
            .then(res => res.json())
            .then(async data => {
                const album = data.find(a => a.id === albumId);
                currentAlbum = album;
                
                if(album) {
                    const song = album.songs.find(s => s.id === songId);
                    currentSong = song;
                    
                    if(song) {
                        document.getElementById('songTitle').innerText = song.title;
                        document.getElementById('artist').innerText = song.artist;
                        
                        downloadBtn.href = song.src;
                        downloadBtn.download = song.title + '.mp3';
                        
                        const playMode = detectPlayMode(song.src);
                        if (playMode.type === 'intro_loop') {
                            playIntroLoop(playMode.baseName);
                        } else {
                            audio.src = song.src;
                        }
                    }
                }
            });
    </script>
</body>
</html>
