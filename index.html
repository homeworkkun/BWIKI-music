<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BWIKI 音乐资料库 - 第五人格</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/app.css">
</head>
<body>
    <header>
        <span class="back-link" id="backLink" style="display: none;">← 返回</span>
        <h1 id="headerTitle">BWIKI 音乐资料库</h1>
        <p id="headerSubtitle" style="font-size: 0.9rem; color: #666;">施工中 - 暂缺角色曲（小女孩、记者、小说家、噩梦、昆虫学者、女王蜂、斗牛士、牙医）、主题曲、赛事音乐</p>
    </header>

    <div class="container fade-in">
        <div id="view-home" class="view active">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索合集标题、描述、艺术家、标签...">
            </div>
            <div class="tag-tabs" id="tagTabs"></div>
            <div class="album-grid" id="albumGrid"></div>
        </div>

        <div id="view-list" class="view">
            <div class="album-header">
                <p class="album-desc" id="listDesc"></p>
            </div>
            <div class="song-list" id="songList"></div>
        </div>

        <div id="view-player" class="view">
            <div class="player-container">
                <div class="vinyl-container">
                    <div class="vinyl" id="vinyl">
                        <div class="vinyl-icon"></div>
                    </div>
                </div>
                
                <div class="song-detail-info">
                    <h2 id="playerTitle">Loading...</h2>
                    <p class="artist" id="playerArtist">...</p>
                    <div class="play-mode-badge" id="playModeBadge" style="display:none;"></div>
                </div>

                <div class="progress-section">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="control-btn small" id="prevBtn" title="上一首">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                        </svg>
                    </button>
                    <button class="control-btn large" id="playBtn">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" id="playIcon">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <button class="control-btn small" id="nextBtn" title="下一首">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                        </svg>
                    </button>
                </div>

                <div class="play-mode-section">
                    <button class="play-mode-btn" id="playModeBtn" title="切换播放模式">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="playModeIcon">
                            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                        </svg>
                        <span id="playModeText">列表循环</span>
                    </button>
                </div>

                <div class="volume-section">
                    <span class="volume-icon" id="volumeIcon">🔊</span>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                    <span class="volume-value" id="volumeValue">80%</span>
                </div>

                <div class="action-buttons">
                    <a class="action-btn-text" id="downloadBtn" href="#" download>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                        </svg>
                        下载
                    </a>
                    <button class="action-btn-text" id="backToListBtn">← 返回列表</button>
                </div>
            </div>
        </div>

        <div id="view-simpleplay" class="view">
            <div class="simple-player">
                <div class="simple-progress">
                    <span id="simpleCurrentTime">0:00</span>
                    <div class="simple-progress-bar">
                        <div class="simple-progress-fill" id="simpleProgressFill"></div>
                    </div>
                    <span id="simpleDuration">0:00</span>
                </div>
                <div class="simple-controls">
                    <button class="simple-play-btn" id="simplePlayBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="simplePlayIcon">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </button>
                    <a class="simple-download-btn" id="simpleDownloadBtn" href="#" download>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="mini-player" id="miniPlayer">
        <div class="mini-player-left">
            <div class="mini-vinyl" id="miniVinyl">
                <div class="mini-vinyl-icon"></div>
            </div>
            <div class="mini-info">
                <div class="mini-title" id="miniTitle"></div>
                <div class="mini-artist" id="miniArtist"></div>
            </div>
        </div>
        <div class="mini-player-right">
            <div class="mini-controls">
                <button class="mini-control-btn" id="miniPrevBtn" title="上一首">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button class="mini-play-btn" id="miniPlayBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="miniPlayIcon">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
                <button class="mini-control-btn" id="miniNextBtn" title="下一首">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
            </div>
            <div class="mini-volume">
                <span class="mini-volume-icon" id="miniVolumeIcon">🔊</span>
                <input type="range" class="mini-volume-slider" id="miniVolumeSlider" min="0" max="100" value="80">
            </div>
        </div>
        <div class="mini-progress">
            <div class="mini-progress-bar" id="miniProgressBar">
                <div class="mini-progress-fill" id="miniProgressFill"></div>
            </div>
            <div class="mini-time">
                <span id="miniCurrentTime">0:00</span>
                <span id="miniDuration">0:00</span>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>
    <script src="/app.js"></script>
</body>
</html>
