<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIKI 音乐馆 - 第五人格</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .tag-tabs {
            display: flex; flex-wrap: wrap; gap: 10px;
            margin-bottom: 25px; padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        
        .tag-tab {
            padding: 8px 16px; background: #2a2a2a;
            border: 1px solid #444; border-radius: 20px;
            color: #888; font-size: 0.9rem; cursor: pointer;
            transition: all 0.2s;
        }
        .tag-tab:hover { border-color: var(--accent-color); color: var(--accent-color); }
        .tag-tab.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--accent-color); color: var(--accent-color);
        }
        
        .search-box {
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 25px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .search-box input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        .search-box input::placeholder {
            color: #666;
        }
        
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }
        
        @media (max-width: 600px) {
            .album-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            header h1 { font-size: 1.3rem; }
            header p { font-size: 0.8rem !important; }
            .container { padding: 20px 15px; }
            .tag-tabs { gap: 8px; }
            .tag-tab { padding: 6px 12px; font-size: 0.85rem; }
        }
        
        .album-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .album-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .album-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .album-info h3 {
            margin: 0 0 8px 0;
            font-size: 1.2rem;
        }
        .album-info .desc {
            font-size: 0.85rem;
            color: #888;
            margin: 0 0 10px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.4em;
        }
        .album-info .tags {
            display: flex; flex-wrap: wrap; gap: 6px;
            margin-bottom: 10px;
            min-height: 22px;
        }
        .album-info .tag {
            display: inline-block; padding: 2px 8px;
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--accent-color);
            border-radius: 12px; font-size: 0.7rem;
            color: var(--accent-color);
        }
        .album-info .meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; color: #555; margin: 0;
            margin-top: auto;
        }
        .album-info .date {
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <header>
        <h1>BWIKI 音乐资料库</h1>
        <p style="font-size: 0.9rem; color: #666;">施工中 - 2024年11月14日后内容暂未更新</p>
    </header>

    <div class="container fade-in">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索合集标题、描述、艺术家、标签..." oninput="handleSearch()">
        </div>
        <div class="tag-tabs" id="tagTabs"></div>
        <div class="album-grid" id="albumGrid"></div>
    </div>

    <script>
        let allData = [];
        let currentTag = 'all';
        let searchQuery = '';
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            // 支持 - 或 / 作为分隔符
            const parts = dateStr.split(/[-\/]/);
            if (parts.length === 3) {
                return `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
            }
            return dateStr;
        }
        
        function parseDate(dateStr) {
            if (!dateStr) return new Date(0);
            return new Date(dateStr);
        }
        
        function getAllTags(data) {
            const tagSet = new Set();
            data.forEach(album => {
                if (album.tags && Array.isArray(album.tags)) {
                    album.tags.forEach(tag => tagSet.add(tag));
                }
            });
            return Array.from(tagSet).sort();
        }
        
        function renderTagTabs(tags) {
            const container = document.getElementById('tagTabs');
            container.innerHTML = `
                <div class="tag-tab ${currentTag === 'all' ? 'active' : ''}" onclick="filterByTag('all')">
                    全部
                </div>
            `;
            tags.forEach(tag => {
                container.innerHTML += `
                    <div class="tag-tab ${currentTag === tag ? 'active' : ''}" onclick="filterByTag('${tag}')">
                        ${tag}
                    </div>
                `;
            });
        }
        
        function filterByTag(tag) {
            currentTag = tag;
            renderTagTabs(getAllTags(allData));
            renderAlbums();
        }
        
        function handleSearch() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            renderAlbums();
        }
        
        function matchSearch(album, query) {
            if (!query) return true;
            
            if (album.title && album.title.toLowerCase().includes(query)) return true;
            if (album.desc && album.desc.toLowerCase().includes(query)) return true;
            if (album.tags && album.tags.some(tag => tag.toLowerCase().includes(query))) return true;
            if (album.songs && album.songs.some(song => 
                (song.artist && song.artist.toLowerCase().includes(query)) ||
                (song.title && song.title.toLowerCase().includes(query))
            )) return true;
            
            return false;
        }
        
        function renderAlbums() {
            const grid = document.getElementById('albumGrid');
            grid.innerHTML = '';
            
            let filteredData = allData;
            
            if (currentTag !== 'all') {
                filteredData = filteredData.filter(album => 
                    album.tags && album.tags.includes(currentTag)
                );
            }
            
            if (searchQuery) {
                filteredData = filteredData.filter(album => matchSearch(album, searchQuery));
            }
            
            if (filteredData.length === 0) {
                const message = searchQuery 
                    ? `未找到与 "${searchQuery}" 相关的音乐` 
                    : '暂无该分类的音乐';
                grid.innerHTML = `<div style="text-align:center;color:#666;padding:40px;">${message}</div>`;
                return;
            }
            
            filteredData.forEach(album => {
                const div = document.createElement('div');
                div.className = 'album-card';
                div.onclick = () => window.location.href = `/list.html?albumId=${album.id}`;
                
                const tagsHtml = (album.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');
                
                div.innerHTML = `
                    <div class="album-info">
                        <h3>${album.title}</h3>
                        <p class="desc">${album.desc || ''}</p>
                        ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
                        <p class="meta">
                            <span class="count">${album.songs.length} 首曲目</span>
                            <span class="date">${album.releaseDate ? formatDate(album.releaseDate) : ''}</span>
                        </p>
                    </div>
                `;
                grid.appendChild(div);
            });
        }
        
        fetch('/data.json')
            .then(res => res.json())
            .then(data => {
                allData = data.sort((a, b) => {
                    const dateA = parseDate(a.releaseDate);
                    const dateB = parseDate(b.releaseDate);
                    return dateB - dateA;
                });
                
                renderTagTabs(getAllTags(allData));
                renderAlbums();
            })
            .catch(err => console.error("无法读取 data.json", err));
    </script>
</body>
</html>
